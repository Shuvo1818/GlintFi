name: Rust CI & Build & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node.js Dependencies
      run: npm install

    - name: Run Frontend Unit Tests
      run: npm run test

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Build WASM Contract
      run: cargo build --target wasm32-unknown-unknown --release --manifest-path Cargo.toml
      env:
        RUSTFLAGS: "-C target-feature=-reference-types"

    - name: Setup Stellar CLI
      run: |
        mkdir -p $HOME/.cargo/bin
        curl -fsSL https://github.com/stellar/stellar-cli/releases/download/v22.0.1/stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz | tar xz -C $HOME/.cargo/bin
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Optimize Contract WASM
      run: stellar contract optimize --wasm target/wasm32-unknown-unknown/release/gullak_vault.wasm

    - name: Configure Network
      run: |
        stellar network add --rpc-url https://soroban-testnet.stellar.org --network-passphrase "Test SDF Network ; September 2015" testnet

    - name: Deploy Custom Contract to Testnet
      run: |
        stellar keys generate deployer --network testnet
        DEPLOYER_ADDR=$(stellar keys address deployer)
        echo "Deployer Account Address: $DEPLOYER_ADDR"
        
        CONTRACT_ID=$(stellar contract deploy --wasm target/wasm32-unknown-unknown/release/gullak_vault.optimized.wasm --source deployer --network testnet)
        echo "=========================================================="
        echo "SUCCESSFULLY DEPLOYED CUSTOM SMART CONTRACT TO TESTNET!"
        echo "Deployed Contract ID: $CONTRACT_ID"
        echo "Deployer Address: $DEPLOYER_ADDR"
        echo "Stellar Explorer Link to view Transaction Hash:"
        echo "https://stellar.expert/explorer/testnet/account/$DEPLOYER_ADDR"
        echo "=========================================================="
